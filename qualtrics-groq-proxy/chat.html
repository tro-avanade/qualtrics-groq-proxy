<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; padding: 12px; background: white; }
    #chat-history {
      height: 300px; overflow-y: auto; border: 1px solid #ddd;
      border-radius: 8px; padding: 12px; background: 
#f9f9f9; margin-bottom: 12px;
    }
    .input-row { display: flex; gap: 8px; }
    #chat-input {
      flex: 1; padding: 10px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 14px;
    }
    #send-btn {
      padding: 10px 18px; background: 
#4CAF50; color: white;
      border: none; border-radius: 6px; cursor: pointer; font-size: 14px;
    }
    .bubble-wrap { display: flex; margin-bottom: 10px; }
    .bubble-wrap.user { justify-content: flex-end; }
    .bubble-wrap.assistant { justify-content: flex-start; }
    .bubble {
      max-width: 80%; padding: 10px 14px; border-radius: 16px;
      font-size: 14px; line-height: 1.4;
    }
    .bubble.user { background: 
#4CAF50; color: white; }
    .bubble.assistant { background: white; color: #333; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <div id="chat-history"></div>
  <div class="input-row">
    <input id="chat-input" type="text" placeholder="Type your message here..." />
    <button id="send-btn">Send</button>
  </div>
  <script>
    var conversationHistory = [];
    var PROXY_URL = 'https://qualtrics-groq-proxy.vercel.app/api/chat';
    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('chat-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
    function addMessage(role, text) {
      var history = document.getElementById('chat-history');
      var wrap = document.createElement('div');
      wrap.className = 'bubble-wrap ' + role;
      var bubble = document.createElement('div');
      bubble.className = 'bubble ' + role;
      bubble.innerText = text;
      wrap.appendChild(bubble);
      history.appendChild(wrap);
      history.scrollTop = history.scrollHeight;
    }
    function sendMessage() {
      var input = document.getElementById('chat-input');
      var userMessage = input.value.trim();
      if (!userMessage) return;
      addMessage('user', userMessage);
      input.value = '';
      conversationHistory.push({ role: 'user', content: userMessage });
      addMessage('assistant', '...');
      fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var history = document.getElementById('chat-history');
        history.removeChild(history.lastChild);
        addMessage('assistant', data.reply);
        conversationHistory.push({ role: 'assistant', content: data.reply });
      })
      .catch(function() {
        var history = document.getElementById('chat-history');
        history.removeChild(history.lastChild);
        addMessage('assistant', 'Sorry, something went wrong. Please try again.');
      });
    }
  </script>
</body>
</html>
